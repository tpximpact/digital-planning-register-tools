<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Status</title>
    <!-- __CONFIG__ -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
        font-size: 13px;
        background: #111;
        color: #ccc;
        padding: 2rem;
        line-height: 1.5;
      }

      header {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #222;
      }
      header h1 {
        font-size: 1rem;
        color: #fff;
      }
      #ts {
        color: #444;
        font-size: 0.8rem;
        flex: 1;
      }

      button#refresh {
        padding: 0.25rem 0.7rem;
        background: none;
        border: 1px solid #333;
        color: #888;
        cursor: pointer;
        border-radius: 3px;
        font: inherit;
      }
      button#refresh:hover {
        border-color: #555;
        color: #ccc;
      }
      button#refresh:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .group-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #444;
        margin: 1.5rem 0 0.5rem;
      }

      .card {
        border: 1px solid #222;
        border-radius: 4px;
        margin-bottom: 0.5rem;
        overflow: hidden;
      }
      .card.ok {
        border-left: 3px solid #3fb950;
      }
      .card.fail {
        border-left: 3px solid #f85149;
      }
      .card.partial {
        border-left: 3px solid #d29922;
      }

      .card-header {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        padding: 0.5rem 0.8rem;
        background: #161616;
        font-weight: 600;
        font-size: 0.82rem;
        color: #ddd;
      }
      .card-path {
        color: #555;
        font-weight: 400;
        font-size: 0.75rem;
        word-break: break-all;
      }
      .card-score {
        margin-left: auto;
        font-size: 0.72rem;
        color: #555;
        white-space: nowrap;
      }

      ul.clients {
        list-style: none;
        padding: 0.3rem 0.8rem 0.4rem;
      }

      li.client {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 0.3rem 0.8rem;
        padding: 0.18rem 0;
        border-bottom: 1px solid #1a1a1a;
      }
      li.client:last-child {
        border: none;
      }
      .client-id {
        white-space: nowrap;
        min-width: 180px;
      }

      details {
        flex: 1;
        min-width: 160px;
      }
      details summary {
        cursor: pointer;
        color: #4a9eff;
        font-size: 0.72rem;
        list-style: none;
      }
      details summary:hover {
        text-decoration: underline;
      }
      pre.body {
        margin-top: 0.3rem;
        padding: 0.4rem 0.6rem;
        background: #0a0a0a;
        border: 1px solid #1e1e1e;
        border-radius: 3px;
        font-size: 0.7rem;
        color: #aaa;
        white-space: pre;
        overflow: auto;
        max-height: 200px;
      }

      .error {
        color: #f85149;
        padding: 0.5rem 0;
      }
      #spinner {
        color: #444;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⚡ API Status</h1>
      <span id="ts">—</span>
      <button id="refresh" disabled>↻ Refresh</button>
    </header>
    <div id="spinner">Discovering routes…</div>
    <div id="results"></div>

    <script>
      const { clientIds: CLIENT_IDS, routes: ROUTES } = window.__STATUS_CONFIG__

      // ── Helpers ────────────────────────────────────────────────────────────

      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
      }

      function groupFor(path) {
        if (path.startsWith('/api/@next/public'))
          return 'Public — /api/@next/public'
        if (path.startsWith('/api/@next')) return 'Private — /api/@next'
        return 'Other'
      }

      function labelFor(path) {
        return (
          path
            .replace(/^\/api\/@next\/(?:public\/)?/, '')
            .split('/')
            .filter(Boolean)
            .map((s) => s.charAt(0).toUpperCase() + s.slice(1))
            .join(' / ') || path
        )
      }

      function countLabel(ok, body, status) {
        if (!ok) return `HTTP ${status || 'ERR'}`
        const arr = Array.isArray(body)
          ? body
          : Array.isArray(body?.data)
          ? body.data
          : null
        return arr !== null
          ? `${arr.length} result${arr.length !== 1 ? 's' : ''} found`
          : 'OK'
      }

      // ── Route resolution ───────────────────────────────────────────────────
      // For each :param in a route, split the path at that param to get the
      // parent list URL, fetch its first item, and use that id going forward.
      // Resolved ids are cached so sibling routes reuse them without re-fetching.

      // Resolve a dot-notation string path against an object
      // e.g. 'data.application.reference' against the response JSON
      function getByPath(obj, dotPath) {
        return dotPath.split('.').reduce((acc, key) => {
          if (acc === null || acc === undefined) return undefined
          // Handle array index notation e.g. data[0]
          const match = key.match(/^([a-zA-Z_$][a-zA-Z0-9_$]*)\[(\d+)\]$/)
          if (match) return acc[match[1]]?.[parseInt(match[2])]
          return acc[key]
        }, obj)
      }

      async function resolveRoutes() {
        const cache = {}
        const resolved = []

        for (const route of ROUTES) {
          const params = [...route.path.matchAll(/:([a-zA-Z]+)/g)].map(
            (m) => m[1]
          )
          let path = route.path
          let skip = false

          for (const param of params) {
            if (cache[param]) {
              path = path.replace(`:${param}`, cache[param])
              continue
            }

            // Find the route that declares this param in its childParams
            const parentRoute = ROUTES.find((r) => r.childParams?.[param])
            if (!parentRoute) {
              skip = true
              break
            }

            // Resolve any params in the parent's path using the cache
            const parentPath = Object.keys(cache).reduce(
              (p, key) => p.replace(`:${key}`, cache[key]),
              parentRoute.path
            )

            const parentQuery = parentRoute.query
              ? `?${new URLSearchParams(parentRoute.query).toString()}`
              : ''

            try {
              const res = await fetch(`${parentPath}${parentQuery}`, {
                headers: {
                  'x-client': CLIENT_IDS[0],
                  'x-service': 'status-checker'
                }
              })
              if (!res.ok) {
                skip = true
                break
              }

              const json = await res.json()

              // Use the dot-notation path from childParams to extract the id
              const dotPath = parentRoute.childParams[param]
              const id = getByPath(json, dotPath) ?? null
              // console.log(
              //   'dotPath:',
              //   dotPath,
              //   '→ id:',
              //   id,
              //   '| json:',
              //   JSON.stringify(json).slice(0, 200)
              // )
              if (!id) {
                skip = true
                break
              }

              cache[param] = id
              path = path.replace(`:${param}`, id)

              console.log(
                `Resolved param :${param} → ${id} (from ${parentPath}${parentQuery})`
              )
            } catch {
              skip = true
              break
            }
          }

          if (!skip)
            resolved.push({ method: route.method, path, label: labelFor(path) })
        }

        return resolved
      }

      // ── Render ─────────────────────────────────────────────────────────────

      function render(results) {
        if (!results.length)
          return '<p class="error">No checkable routes found.</p>'

        const groups = {}
        for (const ep of results) {
          const g = groupFor(ep.path)
          ;(groups[g] = groups[g] || []).push(ep)
        }

        const total = CLIENT_IDS.length
        let html = ''

        for (const [name, eps] of Object.entries(groups)) {
          html += `<div class="group-label">${esc(name)}</div>`

          for (const ep of eps) {
            const passing = ep.clients.filter((c) => c.ok).length
            const icon = passing === total ? '✅' : passing === 0 ? '❌' : '⚠️'
            const cls =
              passing === total ? 'ok' : passing === 0 ? 'fail' : 'partial'

            const clientRows = ep.clients
              .map(
                (c) => `
              <li class="client">
                <span class="client-id">${c.ok ? '✅' : '❌'} <code>${esc(
                  c.clientId
                )}</code> — ${countLabel(c.ok, c.body, c.status)}</span>
                <details><summary>response</summary><pre class="body">${esc(
                  JSON.stringify(c.body, null, 2)
                )}</pre></details>
              </li>`
              )
              .join('')

            html += `
              <div class="card ${cls}">
                <div class="card-header">
                  ${icon} ${esc(ep.label)}
                  <span class="card-path">${esc(ep.path)}</span>
                  <span class="card-score">${passing}/${total} OK</span>
                </div>
                <ul class="clients">${clientRows}</ul>
              </div>`
          }
        }

        return html
      }

      // ── Check all ──────────────────────────────────────────────────────────

      async function checkAll() {
        const btn = document.getElementById('refresh')
        btn.disabled = true
        document.getElementById('spinner').textContent = 'Resolving routes…'
        document.getElementById('spinner').style.display = 'block'
        document.getElementById('results').innerHTML = ''

        let endpoints
        try {
          endpoints = await resolveRoutes()
        } catch (err) {
          document.getElementById(
            'results'
          ).innerHTML = `<p class="error">Route resolution failed: ${esc(
            err.message
          )}</p>`
          document.getElementById('spinner').style.display = 'none'
          btn.disabled = false
          return
        }

        document.getElementById(
          'spinner'
        ).textContent = `Checking ${endpoints.length} endpoints…`

        const results = await Promise.all(
          endpoints.map(async (ep) => {
            const clients = await Promise.all(
              CLIENT_IDS.map(async (clientId) => {
                try {
                  const res = await fetch(ep.path, {
                    method: ep.method || 'GET',
                    headers: {
                      'x-client': clientId,
                      'x-service': 'status-checker'
                    }
                  })
                  let body
                  try {
                    body = await res.json()
                  } catch {
                    body = await res.text()
                  }
                  return { clientId, ok: res.ok, status: res.status, body }
                } catch (err) {
                  return {
                    clientId,
                    ok: false,
                    status: 0,
                    body: { error: err.message }
                  }
                }
              })
            )
            return { label: ep.label, path: ep.path, clients }
          })
        )

        document.getElementById('results').innerHTML = render(results)
        document.getElementById('ts').textContent = new Date().toISOString()
        document.getElementById('spinner').style.display = 'none'
        btn.disabled = false
      }

      document.getElementById('refresh').addEventListener('click', checkAll)
      checkAll()
    </script>
  </body>
</html>
