name: Run tests

on:
  pull_request:
    branches:
      - '**' # Run on all branches for pull requests
  push:
    branches:
      - main # Run only on the main branch for pushes

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install packages
        run: bun install

      - name: Lint code
        run: bun run lint

      - name: Build code
        run: bun run build

      - name: Test
        run: bun run test

      - name: Coverage
        run: bun run coverage
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build Docker image
        run: docker build -t dpr-backend:api -f ./apps/api/Dockerfile .

      - name: Run Docker image
        run: docker run -d --rm -p 4000:3000 dpr-backend:api

      - name: Test Docker image
        run: wget -qO- http://localhost:4000/health | grep "ok"
